[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "pip install -r backend/requirements.txt",
    "npm --prefix frontend install"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "cd backend && gunicorn -w 2 --bind 0.0.0.0:${PORT:-5000} 'app:create_app()'"
